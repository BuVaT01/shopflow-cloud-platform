<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFlow Cloud | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="brand">ShopFlow Cloud</div>
    <h1>Secure Access Portal</h1>
    <p>ERP, CRM va WMS tizimlariga xavfsiz kirish oynasi</p>

    <form onsubmit="return loginUser(event)">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" required>

      <label>Password</label>
      <input type="password" id="password" placeholder="admin123" required>

      <button type="submit">Login</button>
      <p id="loginMessage"></p>
    </form>

    <div class="hint">
      Demo login: <strong>admin</strong> / <strong>admin123</strong>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
